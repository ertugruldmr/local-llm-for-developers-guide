[pytest]
# Each package is independent and uses a top-level `backend` import, so tests
# run from a package root (per CLAUDE.md). Use ./run_tests.sh to sweep all
# packages, or `cd <package> && ../.venv/bin/python -m pytest`.
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -ra
